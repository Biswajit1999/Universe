# Firebase App Hosting configuration.
# https://firebase.google.com/docs/app-hosting/configure
#
# Secrets (API keys) should be stored in Cloud Secret Manager and referenced
# here — do NOT commit real values. Public Firebase config uses NEXT_PUBLIC_*.
runConfig:
  minInstances: 0
  maxInstances: 2
  cpu: 1
  memoryMiB: 512

# Example of wiring a secret (create it first: `firebase apphosting:secrets:set NASA_API_KEY`)
# env:
#   - variable: NASA_API_KEY
#     secret: NASA_API_KEY
#   - variable: GEMINI_API_KEY
#     secret: GEMINI_API_KEY
#   - variable: NEXT_PUBLIC_FIREBASE_API_KEY
#     value: "your-public-web-api-key"
